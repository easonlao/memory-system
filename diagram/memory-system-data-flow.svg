<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;family=Noto+Sans+SC:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
  </style>

  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-emerald" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
    <marker id="arrow-violet" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fb923c"/>
    </marker>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#0a0f1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg-grad)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Title -->
  <text x="550" y="35" fill="white" font-size="16" font-weight="700" text-anchor="middle">五层记忆系统 — 数据流转图</text>
  <text x="550" y="53" fill="#94a3b8" font-size="10" text-anchor="middle">单源存储 + 自动编译模式</text>

  <!-- ============================================ -->
  <!-- COLUMN 1: INPUT SOURCES -->
  <!-- ============================================ -->
  <rect x="30" y="75" width="170" height="250" rx="10" fill="none" stroke="#22d3ee" stroke-width="1" stroke-dasharray="6,3" opacity="0.5"/>
  <text x="42" y="92" fill="#22d3ee" font-size="10" font-weight="600" opacity="0.8">输入源</text>

  <!-- 日常对话 -->
  <rect x="47" y="105" width="140" height="44" rx="6" fill="#0f172a"/>
  <rect x="47" y="105" width="140" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="117" y="122" fill="white" font-size="12" font-weight="600" text-anchor="middle">日常对话</text>
  <text x="117" y="138" fill="#94a3b8" font-size="8" text-anchor="middle">自动采集偏好与决策习惯</text>

  <!-- 主动日记 -->
  <rect x="47" y="165" width="140" height="44" rx="6" fill="#0f172a"/>
  <rect x="47" y="165" width="140" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="117" y="182" fill="white" font-size="12" font-weight="600" text-anchor="middle">主动日记</text>
  <text x="117" y="198" fill="#94a3b8" font-size="8" text-anchor="middle">日/周/月结构化复盘</text>

  <!-- 问卷 -->
  <rect x="47" y="225" width="140" height="44" rx="6" fill="#0f172a"/>
  <rect x="47" y="225" width="140" height="44" rx="6" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="117" y="242" fill="white" font-size="12" font-weight="600" text-anchor="middle">33 题初始化问卷</text>
  <text x="117" y="258" fill="#94a3b8" font-size="8" text-anchor="middle">一次性建立基础画像</text>

  <!-- ============================================ -->
  <!-- COLUMN 2: DISTILLATION PROCESS -->
  <!-- ============================================ -->

  <!-- Arrow: Input → Distillation -->
  <path d="M 190 160 L 230 160" fill="none" stroke="#22d3ee" stroke-width="1.5" marker-end="url(#arrow-cyan)" stroke-dasharray="4,3"/>
  <text x="210" y="153" fill="#22d3ee" font-size="8" text-anchor="middle" opacity="0.8">原始数据</text>

  <rect x="240" y="135" width="120" height="50" rx="8" fill="#0f172a"/>
  <rect x="240" y="135" width="120" height="50" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.5"/>
  <text x="300" y="155" fill="white" font-size="12" font-weight="600" text-anchor="middle">蒸馏提炼</text>
  <text x="300" y="172" fill="#94a3b8" font-size="8" text-anchor="middle">AI 发现共性规律</text>

  <!-- ============================================ -->
  <!-- COLUMN 3: STORAGE LAYER (SINGLE SOURCE) -->
  <!-- ============================================ -->

  <!-- Arrow: Distillation → Storage -->
  <path d="M 360 160 L 410 160" fill="none" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrow-emerald)"/>
  <text x="385" y="153" fill="#34d399" font-size="8" text-anchor="middle" opacity="0.8">提炼写入</text>

  <!-- Storage Region -->
  <rect x="420" y="70" width="220" height="370" rx="12" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.7"/>
  <rect x="420" y="58" width="160" height="20" rx="4" fill="#a78bfa" opacity="0.2"/>
  <text x="440" y="72" fill="#a78bfa" font-size="10" font-weight="600">存储层（唯一数据源）</text>

  <!-- L1 -->
  <rect x="440" y="90" width="180" height="44" rx="6" fill="#0f172a"/>
  <rect x="440" y="90" width="180" height="44" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="108" fill="#a78bfa" font-size="10" font-weight="600">L1</text>
  <text x="490" y="108" fill="white" font-size="11" font-weight="600">核心层</text>
  <text x="530" y="124" fill="#c4b5fd" font-size="8">价值观 · 底线 · 核心驱动力</text>

  <!-- L2 -->
  <rect x="440" y="144" width="180" height="44" rx="6" fill="#0f172a"/>
  <rect x="440" y="144" width="180" height="44" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="162" fill="#a78bfa" font-size="10" font-weight="600">L2</text>
  <text x="490" y="162" fill="white" font-size="11" font-weight="600">认知模式</text>
  <text x="530" y="178" fill="#c4b5fd" font-size="8">决策习惯 · 思维方式 · 偏好</text>

  <!-- L3 -->
  <rect x="440" y="198" width="180" height="44" rx="6" fill="#0f172a"/>
  <rect x="440" y="198" width="180" height="44" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="216" fill="#a78bfa" font-size="10" font-weight="600">L3</text>
  <text x="490" y="216" fill="white" font-size="11" font-weight="600">行为规律</text>
  <text x="530" y="232" fill="#c4b5fd" font-size="8">能量周期 · 工作节奏 · 习惯</text>

  <!-- L4 -->
  <rect x="440" y="252" width="180" height="44" rx="6" fill="#0f172a"/>
  <rect x="440" y="252" width="180" height="44" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="270" fill="#a78bfa" font-size="10" font-weight="600">L4</text>
  <text x="490" y="270" fill="white" font-size="11" font-weight="600">情境状态</text>
  <text x="530" y="286" fill="#c4b5fd" font-size="8">当前目标 · 卡点 · 优先级</text>

  <!-- L5 -->
  <rect x="440" y="306" width="180" height="44" rx="6" fill="#0f172a"/>
  <rect x="440" y="306" width="180" height="44" rx="6" fill="rgba(76,29,149,0.35)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="470" y="324" fill="#a78bfa" font-size="10" font-weight="600">L5</text>
  <text x="490" y="324" fill="white" font-size="11" font-weight="600">潜意识偏差</text>
  <text x="530" y="340" fill="#c4b5fd" font-size="8">言行不一致 · 自我矛盾</text>

  <!-- Vertical connection line inside storage -->
  <line x1="430" y1="112" x2="430" y2="328" stroke="#a78bfa" stroke-width="1" opacity="0.3" stroke-dasharray="3,3"/>

  <!-- ============================================ -->
  <!-- COLUMN 4: COMPILED VIEW (AI BEHAVIOR RULES) -->
  <!-- ============================================ -->

  <!-- Arrow: Storage → Compiled -->
  <path d="M 640 160 L 700 160" fill="none" stroke="#fb923c" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="670" y="153" fill="#fb923c" font-size="8" text-anchor="middle" opacity="0.8">自动编译</text>

  <!-- Compiled Region -->
  <rect x="710" y="70" width="220" height="200" rx="12" fill="none" stroke="#fb923c" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.6"/>
  <rect x="710" y="58" width="170" height="20" rx="4" fill="#fb923c" opacity="0.15"/>
  <text x="730" y="72" fill="#fb923c" font-size="10" font-weight="600">编译视图（AI 行为规范）</text>

  <!-- AI L1 -->
  <rect x="730" y="95" width="180" height="54" rx="6" fill="#0f172a"/>
  <rect x="730" y="95" width="180" height="54" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="820" y="113" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">AI L1 铁律</text>
  <text x="820" y="129" fill="#d4a574" font-size="8" text-anchor="middle">永不可违 · 从你的红线编译</text>
  <text x="820" y="141" fill="#d4a574" font-size="7" text-anchor="middle">例："绝不以牺牲长期换取短期"</text>

  <!-- AI L2 -->
  <rect x="730" y="159" width="180" height="54" rx="6" fill="#0f172a"/>
  <rect x="730" y="159" width="180" height="54" rx="6" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="820" y="177" fill="#fbbf24" font-size="11" font-weight="600" text-anchor="middle">AI L2 偏好</text>
  <text x="820" y="193" fill="#d4a574" font-size="8" text-anchor="middle">可随你调整 · 从你的认知编译</text>
  <text x="820" y="205" fill="#d4a574" font-size="7" text-anchor="middle">例："输出优先用表格呈现"</text>

  <!-- ============================================ -->
  <!-- FEEDBACK LOOP: AI Behavior → User Input -->
  <!-- ============================================ -->
  <path d="M 820 280 Q 820 350 550 350 Q 115 350 115 290" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="5,4" marker-end="url(#arrow-violet)" opacity="0.4"/>
  <text x="550" y="368" fill="#64748b" font-size="8" text-anchor="middle" opacity="0.6">反馈循环：AI 按规范服务 → 你继续对话 → 更多数据沉淀</text>

  <!-- ============================================ -->
  <!-- LEGEND -->
  <!-- ============================================ -->
  <rect x="30" y="420" width="1040" height="55" rx="8" fill="rgba(30,41,59,0.4)" stroke="#475569" stroke-width="0.5"/>
  <text x="50" y="440" fill="#94a3b8" font-size="9" font-weight="600">图例</text>
  <line x1="100" y1="436" x2="140" y2="436" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
  <text x="145" y="439" fill="#94a3b8" font-size="8">输入源</text>
  <line x1="210" y1="436" x2="250" y2="436" fill="none" stroke="#34d399" stroke-width="1.2"/>
  <text x="255" y="439" fill="#94a3b8" font-size="8">蒸馏处理</text>
  <line x1="320" y1="436" x2="360" y2="436" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="365" y="439" fill="#94a3b8" font-size="8">存储层</text>
  <line x1="430" y1="436" x2="470" y2="436" fill="none" stroke="#fb923c" stroke-width="1.2"/>
  <text x="475" y="439" fill="#94a3b8" font-size="8">编译视图</text>
  <line x1="550" y1="436" x2="590" y2="436" fill="none" stroke="#64748b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="595" y="439" fill="#94a3b8" font-size="8">反馈循环</text>

  <text x="50" y="459" fill="#64748b" font-size="8">核心原则：你只维护一份源数据（L1-L5），AI 行为规范自动从你的数据编译生成，不需要维护两套。</text>

</svg>